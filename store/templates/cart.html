<!DOCTYPE html>
<html>
<head>
    <title>Cart | E STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 p-3">
        <div class="container"><a class="navbar-brand fw-bold" href="{% url 'home' %}">E STORE</a></div>
    </nav>
    <div class="container">
        <div class="card shadow p-4 border-0">
            <h2 class="mb-4">Shopping Cart</h2>
            <table class="table align-middle">
                <thead><tr><th>Product</th><th>Quantity</th><th>Subtotal</th><th>Action</th></tr></thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.product.name }}</td>
                        <td>
                            <form action="{% url 'update_cart' item.id %}" method="POST" class="d-flex">
                                {% csrf_token %}
                                <input type="number" name="quantity" value="{{ item.quantity }}" min="1" class="form-control me-2" style="width: 80px;">
                                <button type="submit" class="btn btn-sm btn-outline-primary">Update</button>
                            </form>
                        </td>
                        <td class="fw-bold">₹{{ item.total_price }}</td>
                        <td>
                            <a href="{% url 'remove_from_cart' item.id %}" class="btn btn-sm btn-danger">Remove</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="text-end mt-4">
                <h3>Total: <span class="text-primary">₹{{ total }}</span></h3>
                {% if cart_items %}
                <a href="{% url 'checkout' %}" class="btn btn-success btn-lg px-5 mt-2">Checkout Now</a>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
