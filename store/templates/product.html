<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ product.name }} | E STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 p-3">
        <div class="container"><a class="navbar-brand fw-bold" href="{% url 'home' %}">E STORE</a></div>
    </nav>
    <div class="container mt-5">
        <div class="card shadow p-4 border-0">
            <div class="row">
                <div class="col-md-6">
                    {% if product.image %}<img src="{{ product.image.url }}" class="img-fluid rounded shadow-sm">{% endif %}
                </div>
                <div class="col-md-6 mt-4">
                    <h1 class="fw-bold">{{ product.name }}</h1>
                    <h2 class="text-primary">₹{{ product.price }}</h2>
                    <p class="mt-3 text-muted">{{ product.description }}</p>
                    <hr>
                    <form action="{% url 'add_to_cart' product.id %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3" style="max-width: 120px;">
                            <label class="form-label">Quantity:</label>
                            <input type="number" name="quantity" class="form-control" value="1" min="1">
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
