<!DOCTYPE html>
<html lang="en">
<head>
    <title>E STORE | Online Shopping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: 0.3s; border: none; }
        .product-card:hover { transform: translateY(-10px); }
        .card-img-top { height: 250px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="{% url 'home' %}">E STORE</a>
            <a href="{% url 'cart' %}" class="btn btn-outline-light">View Cart</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            {% for product in products %}
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                <div class="card h-100 shadow-sm product-card text-center p-2">
                    {% if product.image %}<img src="{{ product.image.url }}" class="card-img-top">{% endif %}
                    <div class="card-body">
                        <h5 class="fw-bold">{{ product.name }}</h5>
                        <p class="text-primary fs-4 fw-bold">₹{{ product.price }}</p>
                        <div class="d-grid gap-2">
                            <a href="{% url 'product_detail' product.id %}" class="btn btn-dark">View Details</a>
                            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-outline-success">Add to Cart</a>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
